<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunaVistaResort | HOME</title>
	<link rel="stylesheet" href="lunastylelogin.css">
	<script src="loginscript.js" defer></script>
</head>
<body>
	<video autoplay loop muted class="background-video">
		<source src="beachvid.mp4" type="video/mp4">
		Your browser does not support the video tag.
	</video>
	<div class="login-overlay">
		<div class="login-box">
			<div class="logo-image"></div>
			<h2>Login to</h2>
            <h1>LunaVista Resort</h1>
			<form>
                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Email Address</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Password</label>
                </div>
                
                <button type="submit" class="login-btn">Sign In</button>
                
                <div class="footer-links">
                    <a href="#">Forgot Password?</a>
                    <div class="divider"></div>
                    <span>New here? <a href="signup.html" class="signup">Sign up here.</a></span>
                </div>
            </form>
		</div>
	</div>
</body>
</html>
