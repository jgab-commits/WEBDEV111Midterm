<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login | ScholarPortal</title>
  <link rel="stylesheet" href="indexstyle.css" />
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <div class="login-header">
        <h1>Student Login</h1>
        <p>Enter your student ID and school email to access ScholarPortal.</p>
      </div>
      <form class="login-form" action="#" method="post">
        <label for="studentId">Student ID</label>
        <input
          type="text"
          id="studentId"
          name="studentId"
          placeholder="e.g. S12345678"
          required
        />

        <label for="email">School Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="name@school.edu"
          required
        />

        <button type="submit">Sign In</button>
      </form>
      <p class="login-note">Need help? Contact your school administrator if you do not have credentials.</p>
    </div>
  </main>
</body>
</html>
