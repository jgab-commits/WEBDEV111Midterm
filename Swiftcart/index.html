<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiftcart - Login</title>
    <link rel="stylesheet" href="indexstyle.css">
</head>
<body>
    <div class="split-container">
        <!-- Left Side - Marketing Image -->
        <div class="split-left">
            <div class="marketing-content">
                <img src="swift.png" alt="Swiftcart Marketing" class="marketing-image">
                <span class="marketing-text">
                    <h1>Welcome to Swiftcart</h1>
                    <h2>Fast, reliable, and easy shopping experience</h2>
                </span>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="split-right">
            <div class="form-container">
                <div class="form-header">
                    <h2>Login</h2>
                    <p>Sign in to your account</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-login">Login</button>
                </form>

                <div class="form-footer">
                    <p>Don't have an account? <a href="#" class="signup-link">Sign up here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="indexscript.js"></script>
</body>
</html>
