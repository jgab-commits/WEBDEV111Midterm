<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthSync Clinic | Book Appointment</title>
  <link rel="stylesheet" href="homestyle.css" />
</head>
<body>
  <main class="wizard-shell">
    <section class="hero-panel">
      <p class="eyebrow">HealthSync Clinic</p>
      <h1>Book your specialist visit in four simple steps</h1>
      <p>Choose your specialty, pick a doctor, select the best schedule, then confirm your details. One question per screen reduces form fatigue and keeps booking fast.</p>
    </section>

    <section class="wizard-card" aria-label="Booking wizard">
      <div class="wizard-progress">
        <span class="step-label">Step <strong id="current-step">1</strong> of 4</span>
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="step-screen" id="step-screen"></div>

      <div class="wizard-actions">
        <button type="button" class="secondary-btn" id="back-btn" disabled>Back</button>
        <button type="button" class="primary-btn" id="next-btn">Continue</button>
      </div>
    </section>
  </main>

  <script src="home.js" defer></script>
</body>
</html>
